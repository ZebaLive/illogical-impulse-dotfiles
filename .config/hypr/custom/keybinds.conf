bind = Super+Shift, code:85, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 6 # [hidden] Move to workspace 6 (keypad)
bind = Super+Shift, code:79, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 7 # [hidden] Move to workspace 7 (keypad)
bind = Super+Shift, code:80, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 8 # [hidden] Move to workspace 8 (keypad)
bind = Super+Shift, code:81, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace 9 # [hidden] Move to workspace 9 (keypad)
